<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="shortcut icon" href="assets/hero-leaf1.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">
    <!-- Google Font - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- DaisyUI & TailwindCSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f0fdf4]">
    <header>
        <!-- Navbar -->
        <section >
            <div class="navbar bg-[#15803d] shadow-sm md:px-10">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden text-white pl-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a>About</a></li>
                        <li><a>Gallery</a></li>
                        <li><a>Plant a Tree</a></li>
                        </ul>
                    </div>
                    <a class="text-lg md:text-xl font-semibold text-white">Green Earth</a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1 space-x-5 text-white">
                        <li><a class="btn btn-ghost">About</a></li>
                        <li><a class="btn btn-ghost">Gallery</a></li>
                        <li><a class="btn btn-ghost">Plant a Tree</a></li>
                    </ul>
                </div>
                <div class="navbar-end">
                    <a class="btn btn-bg text-[#15803d] shadow-none border-none rounded-full">Plan a Tree</a>
                </div>
            </div>
        </section>

        <!-- Banner -->
        <section>
            <!-- Banner Div -->
            <div class="flex flex-col justify-center md:flex-row bg-[#cff0dc]">

                <div class="banner-img-l hidden md:block">
                    <img src="assets/hero-leaf1.png" alt="">
                </div>
                <div class="banner-text flex flex-col items-center justify-center text-center space-y-5 my-5">
                    <h1 class="text-xl md:text-3xl font-semibold">Plant a Tree, Grow a Future</h1>
                    <p class="text-sm text-gray-500">Join our mission to plant 1 million trees and make the Earth greener for future
                        generations.</p>
                    <button class="btn btn-bg text-[#15803d] shadow-none border-none rounded-full">Get Involved</button>  
                </div>
                <div class="banner-img-r hidden md:block">
                    <img src="assets/hero-leaf2.png" alt="">
                </div>

                <!-- For SM Device -->
                <div class="flex">
                    <div class="block md:hidden">
                        <img src="assets/hero-leaf1.png" alt="">
                    </div>
                    <div class="block md:hidden">
                        <img src="assets/hero-leaf2.png" alt="">
                    </div>
                </div>
                <!--  -->
            </div>
        </section>
    </header>
    <main class="max-w-[1920px] mx-auto">
        <section>
            <div class="mt-20">
                <div class="text-center">
                    <h1 class="text-3xl font-semibold mb-10">Choose Your Trees</h1>
                </div>
                <!-- Buttons, Cards, Cart -->
                <div class="btn-card-cart w-11/12 mx-auto flex flex-col md:flex-row gap-10 md:gap-0 justify-between">
                    <!-- All Categories Button -->
                    <div id="all-cat-btn" class="flex flex-row flex-wrap justify-center md:justify-start md:flex-col gap-2 space-y-2">

                    </div>
                    <!-- All Cards -->
                    <div id="all-cat-cards" class="grid grid-cols-1 md:grid-cols-3 justify-items-center md:justify-items-start gap-5">
                        
                    </div>
                    <!-- Carts -->
                    <div id="carts" class="mx-auto md:mx-0">
                        
                    </div>
                    <!-- Modal -->
                    <div id="modal">
                        <!-- Open the modal using ID.showModal() method -->
                        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
                        <dialog id="my_modal" class="modal">
                            <div class="modal-box">
                                <div id="modal-info">
                                    <div class="card bg-base-100 w-full shadow-sm rounded-xl">
                                        <figure class="p-5 pb-0">
                                            <img class="rounded-xl h-[250px] w-full object-cover object-center" src="${item.image}"
                                                alt="Tree" />
                                        </figure>
                                        <div class="card-body space-y-1">
                                            <h2 class="card-title">${item.name}</h2>
                                            <p>${item.description}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-action">
                                    <form method="dialog">
                                        <!-- if there is a button in form, it will close the modal -->
                                        <button class="btn btn-ghost text-[#15803d] hover:bg-[#15803d] hover:text-white font-medium border-[#15803d] shadow-none">Close</button>
                                    </form>
                                </div>
                            </div>
                        </dialog>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>

    <script src="script.js"></script>
</body>
</html>
